# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
# Spring Boot reads this file at startup to configure the app.
# You can change settings here without modifying Java code.

# Server port — the app runs on this port (default is 8080)
server.port=8080

# App name (shown in logs)
spring.application.name=student-api

# ============================================================
# PostgreSQL DATABASE CONNECTION
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/student_db
spring.datasource.username=postgres
spring.datasource.password=321654

# JPA / Hibernate settings
# ddl-auto=update → Hibernate will auto-create/update tables based on your Java entities
spring.jpa.hibernate.ddl-auto=update
# show-sql=true → Prints SQL queries in the console (helpful for learning)
spring.jpa.show-sql=true
